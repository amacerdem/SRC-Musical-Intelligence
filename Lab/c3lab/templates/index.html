<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C3 WebLab — Belief Annotation</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════════
     HEADER
     ════════════════════════════════════════════════════════════════ -->
<header id="header">
  <div class="header-left">
    <span class="logo">C3</span>
    <span class="header-title">WebLab — Belief Annotation</span>
  </div>
  <div class="header-center">
    <select id="piece-select"></select>
    <span id="piece-duration" class="badge"></span>
  </div>
  <div class="header-right">
    <button id="btn-export" class="btn btn-accent" title="Export annotations (Ctrl+E)">Export JSON</button>
    <button id="btn-params" class="btn" title="Kernel parameters (Ctrl+P)">Params</button>
  </div>
</header>

<!-- ════════════════════════════════════════════════════════════════
     TRANSPORT
     ════════════════════════════════════════════════════════════════ -->
<div id="transport">
  <button id="btn-play" class="transport-btn" title="Play/Pause (Space)">&#9654;</button>
  <span id="time-display">0:00 / 0:00</span>
  <div id="transport-bar">
    <div id="transport-progress"></div>
    <div id="transport-playhead"></div>
  </div>
  <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8" title="Volume">
</div>

<!-- ════════════════════════════════════════════════════════════════
     TIMELINE SLIDER (24s window)
     ════════════════════════════════════════════════════════════════ -->
<div id="timeline-slider-bar">
  <span id="window-label" class="badge">0:00 -- 0:24</span>
  <input type="range" id="timeline-slider" min="0" max="100" step="0.1" value="0" title="Scroll timeline">
  <span id="window-sec-label" class="badge">24s</span>
</div>

<!-- ════════════════════════════════════════════════════════════════
     MAIN LAYOUT: Charts + Sidebar
     ════════════════════════════════════════════════════════════════ -->
<div id="main">
  <!-- Charts panel -->
  <div id="charts-panel">
    <div id="chart-beliefs" class="chart-container"></div>
    <div id="chart-pe" class="chart-container"></div>
    <div id="chart-precision" class="chart-container"></div>
    <div id="chart-reward" class="chart-container"></div>
  </div>

  <!-- Annotation sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h3>Annotations</h3>
      <span id="ann-count" class="badge">0</span>
    </div>

    <!-- All 3 layers stacked vertically -->
    <div id="sidebar-forms">

      <!-- ── Layer 1: Events ────────────────────────────────── -->
      <details class="layer-section" open>
        <summary class="layer-summary"><span class="layer-badge l1">L1</span> Events</summary>
        <div id="layer1-form" class="layer-form">
          <div class="form-row">
            <label>Category</label>
            <select id="l1-category">
              <option value="IMPORTANT_CHANGE">Important Change</option>
              <option value="TENSION">Tension</option>
              <option value="OTHER">Other</option>
            </select>
          </div>
          <div class="form-row">
            <label>Sub-type</label>
            <select id="l1-subtype"></select>
          </div>
          <div class="form-row">
            <label>Range</label>
            <div id="l1-range-btns" class="range-btns">
              <button class="range-btn" data-half="1">+/-1s</button>
              <button class="range-btn active" data-half="2">+/-2s</button>
              <button class="range-btn" data-half="4">+/-4s</button>
              <button class="range-btn" data-half="8">+/-8s</button>
              <button class="range-btn" data-half="12">+/-12s</button>
            </div>
          </div>
          <div class="form-row">
            <label>Center</label>
            <input type="text" id="l1-center" placeholder="playhead" class="input-sm">
            <span class="text-muted" id="l1-range-preview">0:00 -- 0:04</span>
          </div>
          <div class="form-row">
            <label>Severity</label>
            <input type="range" id="l1-severity" min="1" max="5" value="3">
            <span class="severity-val">3</span>
          </div>
          <textarea id="l1-text" rows="1" placeholder="Comment..." class="comment-input"></textarea>
          <button id="btn-add-l1" class="btn btn-accent btn-full">Add Event</button>
        </div>
      </details>

      <!-- ── Layer 2: Judgments ──────────────────────────────── -->
      <details class="layer-section">
        <summary class="layer-summary"><span class="layer-badge l2">L2</span> Judgments</summary>
        <div id="layer2-form" class="layer-form">
          <div class="form-row">
            <label>Output</label>
            <select id="l2-output"></select>
          </div>
          <div id="l2-judgments" class="judgment-btns"></div>
          <div class="form-row">
            <label>Range</label>
            <div id="l2-range-btns" class="range-btns">
              <button class="range-btn" data-half="1">+/-1s</button>
              <button class="range-btn active" data-half="2">+/-2s</button>
              <button class="range-btn" data-half="4">+/-4s</button>
              <button class="range-btn" data-half="8">+/-8s</button>
              <button class="range-btn" data-half="12">+/-12s</button>
            </div>
          </div>
          <div class="form-row">
            <label>Center</label>
            <input type="text" id="l2-center" placeholder="playhead" class="input-sm">
            <span class="text-muted" id="l2-range-preview">0:00 -- 0:04</span>
          </div>
          <div class="form-row">
            <label>Severity</label>
            <input type="range" id="l2-severity" min="1" max="5" value="3">
            <span class="severity-val">3</span>
          </div>
          <textarea id="l2-text" rows="1" placeholder="Comment..." class="comment-input"></textarea>
          <button id="btn-add-l2" class="btn btn-accent btn-full">Add Judgment</button>
        </div>
      </details>

      <!-- ── Layer 3: Questions ─────────────────────────────── -->
      <details class="layer-section">
        <summary class="layer-summary"><span class="layer-badge l3">L3</span> Questions</summary>
        <div id="layer3-form" class="layer-form">
          <div id="l3-categories" class="question-cat-btns"></div>
          <div class="form-row">
            <label>About</label>
            <select id="l3-output">
              <option value="">(general)</option>
            </select>
          </div>
          <textarea id="l3-question" rows="2" placeholder="What is your question?" class="question-input"></textarea>
          <div class="form-row">
            <label>Range</label>
            <div id="l3-range-btns" class="range-btns">
              <button class="range-btn" data-half="1">+/-1s</button>
              <button class="range-btn active" data-half="2">+/-2s</button>
              <button class="range-btn" data-half="4">+/-4s</button>
              <button class="range-btn" data-half="8">+/-8s</button>
              <button class="range-btn" data-half="12">+/-12s</button>
            </div>
          </div>
          <div class="form-row">
            <label>Center</label>
            <input type="text" id="l3-center" placeholder="playhead" class="input-sm">
            <span class="text-muted" id="l3-range-preview">0:00 -- 0:04</span>
          </div>
          <div class="form-row">
            <label>Severity</label>
            <input type="range" id="l3-severity" min="1" max="5" value="3">
            <span class="severity-val">3</span>
          </div>
          <button id="btn-add-l3" class="btn btn-accent btn-full">Add Question</button>
        </div>
      </details>

    </div>

    <!-- Annotation list -->
    <div id="ann-list"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════
     PARAMS MODAL
     ════════════════════════════════════════════════════════════════ -->
<div id="params-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Kernel Parameters</h3>
      <button class="btn-close" id="btn-params-close">&times;</button>
    </div>
    <div id="params-body"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════
     KEYBOARD SHORTCUTS HELP
     ════════════════════════════════════════════════════════════════ -->
<div id="shortcuts-bar">
  <span><kbd>Space</kbd> Play/Pause</span>
  <span><kbd>M</kbd> Quick L1 mark</span>
  <span><kbd>&larr;</kbd><kbd>&rarr;</kbd> Seek ±2s</span>
  <span><kbd>Ctrl+E</kbd> Export</span>
  <span><kbd>Ctrl+P</kbd> Params</span>
</div>

<!-- ════════════════════════════════════════════════════════════════
     JAVASCRIPT
     ════════════════════════════════════════════════════════════════ -->
<script>
// ── State ────────────────────────────────────────────────────────
const WINDOW_SEC = 24;        // visible window width
const LEAD_FRACTION = 0.33;   // playhead sits at 1/3 from left during auto-scroll
const UPDATE_INTERVAL = 80;   // ms between Plotly relayout calls (throttle)

const state = {
  piece: null,
  pieces: [],
  traces: null,
  schema: null,              // 3-layer annotation schema from server
  annotations: [],
  l1Half: 2,                 // current range half-width for Layer 1
  l2Half: 2,                 // current range half-width for Layer 2
  l3Half: 2,                 // current range half-width for Layer 3
  l2Judgment: 'AGREE',       // selected Layer 2 judgment
  l3Category: 'WHY',         // selected Layer 3 question category
  isPlaying: false,
  currentTime: 0,
  duration: 0,
  viewStart: 0,
};

let audio = new Audio();
let rafId = null;
let lastRelayout = 0;

// ── DOM refs ─────────────────────────────────────────────────────
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const pieceSelect = $('#piece-select');
const btnPlay = $('#btn-play');
const timeDisplay = $('#time-display');
const transportBar = $('#transport-bar');
const transportProgress = $('#transport-progress');
const transportPlayhead = $('#transport-playhead');
const volumeSlider = $('#volume');
const annCount = $('#ann-count');
const annList = $('#ann-list');
const paramsModal = $('#params-modal');
const paramsBody = $('#params-body');
const timelineSlider = $('#timeline-slider');
const windowLabel = $('#window-label');

// ── Colors ───────────────────────────────────────────────────────
const COLORS = {
  consonance: '#58A6FF',
  tempo: '#3FB950',
  salience: '#D29922',
  familiarity: '#BC8CFF',
  reward: '#F78166',
  pe_consonance: '#58A6FF',
  pe_tempo: '#3FB950',
  pe_salience: '#D29922',
  pe_familiarity: '#BC8CFF',
  precision_consonance: '#58A6FF',
  precision_tempo: '#3FB950',
};

const PLOT_BG = '#0D1117';
const PLOT_PAPER = '#161B22';
const PLOT_GRID = '#21262D';
const PLOT_TEXT = '#C9D1D9';
const PLAYHEAD_COLOR = '#F85149';

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  // Load pieces + schema in parallel
  const [pResp, sResp] = await Promise.all([
    fetch('/api/pieces'),
    fetch('/api/annotation-schema'),
  ]);
  state.pieces = await pResp.json();
  state.schema = await sResp.json();

  pieceSelect.innerHTML = state.pieces
    .map(p => `<option value="${p.slug}">${p.title}</option>`)
    .join('');

  // Populate Layer 1 sub-type options
  populateL1Subtypes();
  // Populate Layer 2 output select + judgment buttons
  populateL2Form();
  // Populate Layer 3 category buttons + output select
  populateL3Form();
  // Wire range buttons for all layers
  wireRangeBtns('l1');
  wireRangeBtns('l2');
  wireRangeBtns('l3');
  // Wire severity sliders
  $$('.severity-val').forEach(el => {
    const slider = el.previousElementSibling;
    slider.addEventListener('input', () => { el.textContent = slider.value; });
  });
  // Wire category change → update subtypes
  $('#l1-category').addEventListener('change', populateL1Subtypes);

  // Load first piece
  if (state.pieces.length > 0) {
    await loadPiece(state.pieces[0].slug);
  }

  // Events
  pieceSelect.addEventListener('change', () => loadPiece(pieceSelect.value));
  btnPlay.addEventListener('click', togglePlay);
  transportBar.addEventListener('click', seekFromBar);
  volumeSlider.addEventListener('input', () => { audio.volume = volumeSlider.value; });
  timelineSlider.addEventListener('input', onTimelineSlider);
  $('#btn-add-l1').addEventListener('click', () => addAnnotation(1));
  $('#btn-add-l2').addEventListener('click', () => addAnnotation(2));
  $('#btn-add-l3').addEventListener('click', () => addAnnotation(3));
  $('#btn-export').addEventListener('click', exportAnnotations);
  $('#btn-params').addEventListener('click', () => showParamsModal());
  $('#btn-params-close').addEventListener('click', () => paramsModal.classList.add('hidden'));

  // Audio events
  audio.addEventListener('ended', () => {
    state.isPlaying = false;
    btnPlay.innerHTML = '&#9654;';
    cancelAnimationFrame(rafId);
  });

  document.addEventListener('keydown', handleKeyboard);
  window.addEventListener('resize', () => { if (state.traces) relayoutCharts(); });
}

function populateL1Subtypes() {
  const cat = $('#l1-category').value;
  const events = state.schema.layer1_events;
  const opts = Object.entries(events)
    .filter(([_, v]) => v.parent === cat)
    .map(([id, v]) => `<option value="${id}">${v.label}</option>`)
    .join('');
  $('#l1-subtype').innerHTML = opts;
}

function populateL2Form() {
  // Output select
  const outputs = state.schema.layer2_outputs;
  $('#l2-output').innerHTML = outputs
    .map(o => `<option value="${o.id}">${o.label}</option>`)
    .join('');

  // Judgment buttons
  const judgments = state.schema.layer2_judgments;
  const container = $('#l2-judgments');
  container.innerHTML = judgments.map(j => `
    <button class="judgment-btn ${j.id === state.l2Judgment ? 'active' : ''}"
            data-judgment="${j.id}"
            style="--j-color: ${j.color}">
      ${j.label}
    </button>
  `).join('');
  container.querySelectorAll('.judgment-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.l2Judgment = btn.dataset.judgment;
      container.querySelectorAll('.judgment-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

function populateL3Form() {
  // Category buttons
  const categories = state.schema.layer3_categories;
  const container = $('#l3-categories');
  container.innerHTML = categories.map(c => `
    <button class="question-cat-btn ${c.id === state.l3Category ? 'active' : ''}"
            data-cat="${c.id}"
            style="--q-color: ${c.color}"
            title="${c.hint}">
      ${c.label}
    </button>
  `).join('');
  container.querySelectorAll('.question-cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.l3Category = btn.dataset.cat;
      container.querySelectorAll('.question-cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
  // Output select (optional — can target a specific output or "general")
  const outputs = state.schema.layer2_outputs;
  $('#l3-output').innerHTML = '<option value="">(general)</option>' +
    outputs.map(o => `<option value="${o.id}">${o.label}</option>`).join('');
}

function wireRangeBtns(prefix) {
  const container = $(`#${prefix}-range-btns`);
  container.querySelectorAll('.range-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const half = parseInt(btn.dataset.half);
      if (prefix === 'l1') state.l1Half = half;
      else if (prefix === 'l2') state.l2Half = half;
      else state.l3Half = half;
      container.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateRangePreview(prefix);
    });
  });
  // Also update preview when center changes
  const centerInput = $(`#${prefix}-center`);
  centerInput.addEventListener('input', () => updateRangePreview(prefix));
}

function updateRangePreview(prefix) {
  const half = prefix === 'l1' ? state.l1Half : prefix === 'l2' ? state.l2Half : state.l3Half;
  const centerVal = parseFloat($(`#${prefix}-center`).value);
  const center = isNaN(centerVal) ? state.currentTime : centerVal;
  const start = Math.max(0, center - half);
  const end = Math.min(state.duration || 999, center + half);
  $(`#${prefix}-range-preview`).textContent = `${formatTime(start)} -- ${formatTime(end)}`;
}

// ── Load piece ───────────────────────────────────────────────────
async function loadPiece(slug) {
  state.piece = slug;
  pieceSelect.value = slug;

  // Load traces
  const resp = await fetch(`/api/traces/${slug}`);
  const data = await resp.json();
  state.traces = data.traces;
  state.duration = data.summary.duration_s;
  $('#piece-duration').textContent = `${formatTime(state.duration)}`;

  // Load annotations
  const annResp = await fetch(`/api/annotations/${slug}`);
  state.annotations = await annResp.json();

  // Load audio
  audio.pause();
  state.isPlaying = false;
  btnPlay.innerHTML = '&#9654;';
  audio.src = `/api/audio/${slug}`;
  audio.load();
  state.currentTime = 0;

  // Render
  renderCharts();
  renderAnnotationList();
  updateTransport();
}

// ── Chart rendering ──────────────────────────────────────────────
const CHART_IDS = ['chart-beliefs', 'chart-pe', 'chart-precision', 'chart-reward'];

function getViewRange() {
  const start = Math.max(0, Math.min(state.viewStart, state.duration - WINDOW_SEC));
  return [start, start + WINDOW_SEC];
}

function renderCharts() {
  const t = state.traces;
  if (!t) return;

  const time = t.time_s;
  const range = getViewRange();

  // Configure timeline slider
  const maxStart = Math.max(0, state.duration - WINDOW_SEC);
  timelineSlider.max = maxStart;
  timelineSlider.step = 0.5;
  timelineSlider.value = state.viewStart;
  updateWindowLabel();

  // 4s minor / 12s major grid tick marks
  const dtick = 4;

  const commonLayout = {
    paper_bgcolor: PLOT_PAPER,
    plot_bgcolor: PLOT_BG,
    font: { family: 'JetBrains Mono, monospace', size: 11, color: PLOT_TEXT },
    margin: { l: 55, r: 15, t: 30, b: 35 },
    xaxis: {
      gridcolor: PLOT_GRID, zeroline: false,
      title: '', ticksuffix: 's',
      range: range,
      dtick: dtick,
    },
    yaxis: { gridcolor: PLOT_GRID, zeroline: false },
    showlegend: true,
    legend: {
      orientation: 'h', y: 1.12, x: 0,
      font: { size: 10 }, bgcolor: 'transparent',
    },
    hovermode: 'x unified',
  };

  const shapes = buildShapes();

  // 1. Beliefs chart
  Plotly.newPlot('chart-beliefs', [
    { x: time, y: t.consonance, name: 'Consonance', line: { color: COLORS.consonance, width: 1.5 } },
    { x: time, y: t.tempo, name: 'Tempo', line: { color: COLORS.tempo, width: 1.5 } },
    { x: time, y: t.salience, name: 'Salience', line: { color: COLORS.salience, width: 1.5 } },
    { x: time, y: t.familiarity, name: 'Familiarity', line: { color: COLORS.familiarity, width: 1.5 } },
  ], {
    ...commonLayout,
    title: { text: 'Belief Posteriors', font: { size: 13 } },
    yaxis: { ...commonLayout.yaxis, title: 'value', range: [0, 1] },
    shapes: shapes,
  }, { responsive: true, displayModeBar: false });

  document.getElementById('chart-beliefs').on('plotly_click', handleChartClick);

  // 2. PE chart
  Plotly.newPlot('chart-pe', [
    { x: time, y: t.pe_consonance, name: '|PE| Cons', line: { color: COLORS.pe_consonance, width: 1.2 } },
    { x: time, y: t.pe_tempo, name: '|PE| Tempo', line: { color: COLORS.pe_tempo, width: 1.2 } },
    { x: time, y: t.pe_salience, name: '|PE| Sal', line: { color: COLORS.pe_salience, width: 1.2, dash: 'dot' } },
    { x: time, y: t.pe_familiarity, name: '|PE| Fam', line: { color: COLORS.pe_familiarity, width: 1.2, dash: 'dot' } },
  ], {
    ...commonLayout,
    title: { text: 'Prediction Error |PE|', font: { size: 13 } },
    yaxis: { ...commonLayout.yaxis, title: '|PE|' },
    shapes: shapes,
  }, { responsive: true, displayModeBar: false });

  document.getElementById('chart-pe').on('plotly_click', handleChartClick);

  // 3. Precision chart
  Plotly.newPlot('chart-precision', [
    { x: time, y: t.precision_consonance, name: 'pi Cons', line: { color: COLORS.precision_consonance, width: 1.5 } },
    { x: time, y: t.precision_tempo, name: 'pi Tempo', line: { color: COLORS.precision_tempo, width: 1.5 } },
  ], {
    ...commonLayout,
    title: { text: 'Precision (pi_pred)', font: { size: 13 } },
    yaxis: { ...commonLayout.yaxis, title: 'pi_pred' },
    shapes: shapes,
  }, { responsive: true, displayModeBar: false });

  document.getElementById('chart-precision').on('plotly_click', handleChartClick);

  // 4. Reward chart
  Plotly.newPlot('chart-reward', [
    { x: time, y: t.reward, name: 'Reward', type: 'scatter', mode: 'lines',
      line: { color: COLORS.reward, width: 1.5 },
      fill: 'tozeroy', fillcolor: 'rgba(247,129,102,0.15)' },
    { x: time, y: Array(time.length).fill(0), name: 'zero', mode: 'lines',
      line: { color: '#484F58', width: 0.5, dash: 'dash' }, showlegend: false },
  ], {
    ...commonLayout,
    title: { text: 'Reward Valence', font: { size: 13 } },
    yaxis: { ...commonLayout.yaxis, title: 'reward' },
    shapes: shapes,
  }, { responsive: true, displayModeBar: false });

  document.getElementById('chart-reward').on('plotly_click', handleChartClick);
}

function buildShapes() {
  const shapes = [];

  for (const ann of state.annotations) {
    const color = getAnnColor(ann);
    // All annotations are ranges now
    shapes.push({
      type: 'rect', xref: 'x', yref: 'paper',
      x0: ann.time_start, x1: ann.time_end, y0: 0, y1: 1,
      fillcolor: color + '20',
      line: { color: color, width: 1 },
    });
  }

  // Playhead
  shapes.push({
    type: 'line', xref: 'x', yref: 'paper',
    x0: state.currentTime, x1: state.currentTime, y0: 0, y1: 1,
    line: { color: PLAYHEAD_COLOR, width: 2 },
    _isPlayhead: true,
  });

  return shapes;
}

function getAnnColor(ann) {
  if (ann.layer === 1) {
    const evt = state.schema?.layer1_events?.[ann.event_type];
    return evt?.color || '#8B949E';
  } else if (ann.layer === 2) {
    const j = state.schema?.layer2_judgments?.find(j => j.id === ann.judgment);
    return j?.color || '#8B949E';
  } else {
    const c = state.schema?.layer3_categories?.find(c => c.id === ann.question_category);
    return c?.color || '#79C0FF';
  }
}

function updateChartView(force) {
  // Throttle: skip if called too soon (unless forced)
  const now = performance.now();
  if (!force && now - lastRelayout < UPDATE_INTERVAL) return;
  lastRelayout = now;

  const range = getViewRange();
  const shapes = buildShapes();

  for (const id of CHART_IDS) {
    const el = document.getElementById(id);
    if (!el || !el.layout) continue;
    Plotly.relayout(id, { 'xaxis.range': range, shapes: shapes });
  }

  // Sync slider position
  timelineSlider.value = state.viewStart;
  updateWindowLabel();
}

function updateWindowLabel() {
  const start = state.viewStart;
  const end = Math.min(start + WINDOW_SEC, state.duration);
  windowLabel.textContent = `${formatTime(start)} -- ${formatTime(end)}`;
}

function autoScrollView() {
  // Place playhead at LEAD_FRACTION from left edge
  const target = state.currentTime - WINDOW_SEC * LEAD_FRACTION;
  const maxStart = Math.max(0, state.duration - WINDOW_SEC);
  state.viewStart = Math.max(0, Math.min(target, maxStart));
}

function onTimelineSlider() {
  state.viewStart = parseFloat(timelineSlider.value);
  updateChartView(true);
}

function relayoutCharts() {
  for (const id of CHART_IDS) {
    Plotly.Plots.resize(document.getElementById(id));
  }
}

function handleChartClick(data) {
  if (data.points && data.points.length > 0) {
    const t = data.points[0].x;
    // Seek audio to clicked position
    audio.currentTime = t;
    state.currentTime = t;
    autoScrollView();
    updateTransport();
    updateChartView(true);
    // Set annotation center for all layers
    for (const prefix of ['l1', 'l2', 'l3']) {
      $(`#${prefix}-center`).value = t.toFixed(2);
      updateRangePreview(prefix);
    }
  }
}

// ── Playback ─────────────────────────────────────────────────────
function togglePlay() {
  if (state.isPlaying) {
    audio.pause();
    state.isPlaying = false;
    btnPlay.innerHTML = '&#9654;';
    cancelAnimationFrame(rafId);
  } else {
    audio.play();
    state.isPlaying = true;
    btnPlay.innerHTML = '&#10074;&#10074;';
    tickPlayback();
  }
}

function tickPlayback() {
  state.currentTime = audio.currentTime;
  autoScrollView();
  updateTransport();
  updateChartView(false);
  if (state.isPlaying) {
    rafId = requestAnimationFrame(tickPlayback);
  }
}

function updateTransport() {
  const pct = state.duration > 0 ? (state.currentTime / state.duration * 100) : 0;
  transportProgress.style.width = `${pct}%`;
  transportPlayhead.style.left = `${pct}%`;
  timeDisplay.textContent = `${formatTime(state.currentTime)} / ${formatTime(state.duration)}`;
}

function seekFromBar(e) {
  const rect = transportBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const newTime = pct * state.duration;
  audio.currentTime = newTime;
  state.currentTime = newTime;
  autoScrollView();
  updateTransport();
  updateChartView(true);
}

// ── Annotations (2-layer) ────────────────────────────────────────

async function addAnnotation(layer) {
  const L = layer;
  const prefix = L === 1 ? 'l1' : L === 2 ? 'l2' : 'l3';
  const half = L === 1 ? state.l1Half : L === 2 ? state.l2Half : state.l3Half;
  const centerVal = parseFloat($(`#${prefix}-center`).value);
  const center = isNaN(centerVal) ? state.currentTime : centerVal;
  const timeStart = Math.max(0, center - half);
  const timeEnd = Math.min(state.duration, center + half);
  const severity = parseInt($(`#${prefix}-severity`).value);
  const text = $(`#${prefix}-text`)?.value || '';

  const body = {
    piece: state.piece,
    layer: L,
    time_start: parseFloat(timeStart.toFixed(2)),
    time_end: parseFloat(timeEnd.toFixed(2)),
    severity: severity,
    text: text,
  };

  if (L === 1) {
    body.event_type = $('#l1-subtype').value;
  } else if (L === 2) {
    body.output_id = $('#l2-output').value;
    body.judgment = state.l2Judgment;
  } else {
    body.question_category = state.l3Category;
    body.question_text = $('#l3-question').value || '';
    const l3out = $('#l3-output').value;
    if (l3out) body.output_id = l3out;
  }

  const resp = await fetch('/api/annotations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  const newAnn = await resp.json();
  state.annotations.push(newAnn);
  renderAnnotationList();
  updateChartView(true);

  // Clear text fields
  if ($(`#${prefix}-text`)) $(`#${prefix}-text`).value = '';
  if (L === 3) $('#l3-question').value = '';
}

async function deleteAnnotation(id) {
  await fetch(`/api/annotations/${state.piece}/${id}`, { method: 'DELETE' });
  state.annotations = state.annotations.filter(a => a.id !== id);
  renderAnnotationList();
  updateChartView(true);
}

function renderAnnotationList() {
  annCount.textContent = state.annotations.length;
  if (state.annotations.length === 0) {
    annList.innerHTML = '<div class="ann-empty">No annotations yet. Click a chart or press A to add.</div>';
    return;
  }

  const sorted = [...state.annotations].sort((a, b) => a.time_start - b.time_start);
  annList.innerHTML = sorted.map(ann => {
    const color = getAnnColor(ann);
    const timeStr = `${formatTime(ann.time_start)} - ${formatTime(ann.time_end)}`;
    const sevDots = '&#9679;'.repeat(ann.severity) + '&#9675;'.repeat(5 - ann.severity);

    let label, detail;
    if (ann.layer === 1) {
      const evt = state.schema?.layer1_events?.[ann.event_type];
      label = evt?.label || ann.event_type;
      detail = '';
    } else if (ann.layer === 2) {
      const out = state.schema?.layer2_outputs?.find(o => o.id === ann.output_id);
      const jdg = state.schema?.layer2_judgments?.find(j => j.id === ann.judgment);
      label = out?.label || ann.output_id;
      detail = `<span class="ann-judgment" style="color:${jdg?.color || '#8B949E'}">${jdg?.label || ann.judgment}</span>`;
    } else {
      const cat = state.schema?.layer3_categories?.find(c => c.id === ann.question_category);
      label = (cat?.label || '?') + ' ' + (ann.question_text || '').slice(0, 40);
      if (ann.output_id) {
        const out = state.schema?.layer2_outputs?.find(o => o.id === ann.output_id);
        detail = `<span class="ann-target" style="color:#79C0FF">→ ${out?.label || ann.output_id}</span>`;
      } else {
        detail = '';
      }
    }

    const layerBadges = { 1: '<span class="layer-badge l1">L1</span>', 2: '<span class="layer-badge l2">L2</span>', 3: '<span class="layer-badge l3">L3</span>' };
    const layerBadge = layerBadges[ann.layer] || '';

    return `
      <div class="ann-item" data-id="${ann.id}">
        <div class="ann-item-header">
          ${layerBadge}
          <span class="type-dot" style="background: ${color}"></span>
          <span class="ann-item-type">${label}</span>
          <span class="ann-item-time">${timeStr}</span>
          <button class="btn-tiny btn-seek" onclick="seekToAnnotation(${ann.time_start})" title="Seek">&#9654;</button>
          <button class="btn-tiny btn-del" onclick="deleteAnnotation('${ann.id}')" title="Delete">&times;</button>
        </div>
        ${detail}
        ${ann.text ? `<details class="ann-comment"><summary>Comment</summary><div class="ann-item-text">${escapeHtml(ann.text)}</div></details>` : ''}
        <div class="ann-severity">${sevDots}</div>
      </div>
    `;
  }).join('');
}

function seekToAnnotation(time) {
  audio.currentTime = time;
  state.currentTime = time;
  autoScrollView();
  updateTransport();
  updateChartView(true);
}

async function exportAnnotations() {
  const resp = await fetch(`/api/export/${state.piece}`, { method: 'POST' });
  const data = await resp.json();
  alert(`Exported ${data.annotation_count} annotations.\nPath: ${data.export_path}`);
}

// ── Params modal ─────────────────────────────────────────────────
async function showParamsModal() {
  const resp = await fetch('/api/kernel/params');
  const params = await resp.json();

  paramsBody.innerHTML = Object.entries(params).map(([group, items]) => `
    <div class="param-group">
      <h4>${group}</h4>
      ${Object.entries(items).map(([key, p]) => `
        <div class="param-row">
          <label>${p.label}${p.unit ? ` (${p.unit})` : ''}</label>
          <input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.value}"
                 data-group="${group}" data-key="${key}"
                 oninput="this.nextElementSibling.textContent = this.value">
          <span class="param-value">${p.value}</span>
        </div>
      `).join('')}
    </div>
  `).join('');

  // Add change listeners for live update
  paramsBody.querySelectorAll('input[type=range]').forEach(input => {
    input.addEventListener('change', async () => {
      await fetch('/api/kernel/params', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          group: input.dataset.group,
          key: input.dataset.key,
          value: parseFloat(input.value),
        }),
      });
    });
  });

  paramsModal.classList.remove('hidden');
}

// ── Keyboard shortcuts ───────────────────────────────────────────
function handleKeyboard(e) {
  // Skip if typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  switch (e.key) {
    case ' ':
      e.preventDefault();
      togglePlay();
      break;
    case 'm':
    case 'M':
      e.preventDefault();
      // Quick mark: L1 event at playhead
      addAnnotation(1);
      break;
    case 'ArrowLeft':
      e.preventDefault();
      audio.currentTime = Math.max(0, audio.currentTime - 2);
      state.currentTime = audio.currentTime;
      autoScrollView();
      updateTransport();
      updateChartView(true);
      break;
    case 'ArrowRight':
      e.preventDefault();
      audio.currentTime = Math.min(state.duration, audio.currentTime + 2);
      state.currentTime = audio.currentTime;
      autoScrollView();
      updateTransport();
      updateChartView(true);
      break;
  }

  // Ctrl shortcuts
  if (e.ctrlKey || e.metaKey) {
    switch (e.key) {
      case 'e':
        e.preventDefault();
        exportAnnotations();
        break;
      case 'p':
        e.preventDefault();
        showParamsModal();
        break;
    }
  }
}

// ── Utilities ────────────────────────────────────────────────────
function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Start ────────────────────────────────────────────────────────
init();
</script>
