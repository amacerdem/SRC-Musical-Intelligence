<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S³ Musical Intelligence — Interactive Analysis Demo</title>
    <meta name="description" content="What does your brain hear when you listen to music? An interactive 307-dimensional analysis powered by Musical Intelligence.">

    <!-- S³ Brand -->
    <meta name="theme-color" content="#050508">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- WebGL Canvas (always rendered) -->
    <canvas id="canvas"></canvas>

    <!-- Language Toggle -->
    <button id="lang-toggle">TR</button>

    <!-- Landing Page -->
    <div id="landing">
        <h1 id="landing-title">Musical Intelligence</h1>
        <p id="landing-tagline">What does your brain hear when you listen to music?</p>
        <div id="piece-grid"></div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="hidden">
        <p id="loading-text">Preparing your journey...</p>
        <div id="load-bar"><div id="load-bar-fill"></div></div>
    </div>

    <!-- Experience (main view) -->
    <div id="experience" class="hidden">

        <!-- Right Panel: Live Dimension Readouts -->
        <div id="panel">
            <div id="panel-title">What you're hearing</div>
            <div id="panel-content"></div>
        </div>

        <!-- Level Selector -->
        <div id="level-selector"></div>

        <!-- Narrative Text (L2/L3 only) -->
        <div id="narrative" class="hidden"></div>

        <!-- Question Card -->
        <div id="question-card" class="hidden">
            <p id="question-text"></p>
        </div>

        <!-- Transport Bar -->
        <div id="transport">
            <button id="play-btn">▶</button>
            <div id="progress-bar"><div id="progress-bar-fill"></div></div>
            <span id="time-display">0:00 / 0:00</span>
        </div>
    </div>

    <!-- Summary -->
    <div id="summary" class="hidden"></div>

    <!-- WebGL2 Error -->
    <div id="gl-error" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; color:#94a3b8; font-size:1.1rem; z-index:100;">
        <p>WebGL2 is required for this demo.</p>
        <p style="font-size:0.85rem; margin-top:8px;">Please use a modern browser (Chrome, Firefox, Safari, Edge).</p>
    </div>

    <!-- App Entry Point -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
