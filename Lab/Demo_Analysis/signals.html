<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S³ Musical Intelligence — Brain Signal Viewer</title>
    <meta name="theme-color" content="#0a0a0f">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
    --bg: #0a0a0f;
    --bg-panel: #0d0d14;
    --grid: #1a1a2e;
    --text: #c8c8d4;
    --text-dim: #64748b;
    --accent: #6366f1;
    --playhead: #f9b73a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    overflow: hidden;
}
#header {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--grid);
    background: var(--bg-panel);
}
#header h1 {
    font-size: 14px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
#header .meta { font-size: 11px; color: var(--text-dim); }
#canvas-container {
    position: absolute;
    top: 44px;
    left: 0;
    right: 0;
    bottom: 52px;
}
canvas {
    width: 100%;
    height: 100%;
    display: block;
    cursor: crosshair;
}
#transport {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    background: var(--bg-panel);
    border-top: 1px solid var(--grid);
}
#play-btn {
    width: 32px; height: 32px;
    background: rgba(99, 102, 241, 0.15);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 50%;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
#play-btn:hover { border-color: var(--accent); background: rgba(99, 102, 241, 0.25); }
#progress-wrap {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
}
#progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
    pointer-events: none;
}
#time-display {
    font-size: 12px;
    color: var(--text-dim);
    min-width: 90px;
    text-align: right;
    font-variant-numeric: tabular-nums;
}
#loading {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--text-dim);
    font-size: 14px;
}
    </style>
</head>
<body>
    <div id="loading">Loading brain signals...</div>

    <div id="header" style="display:none">
        <h1>S³ Musical Intelligence — Brain Signal Viewer</h1>
        <span class="meta" id="header-meta"></span>
    </div>

    <div id="canvas-container" style="display:none">
        <canvas id="canvas"></canvas>
    </div>

    <div id="transport" style="display:none">
        <button id="play-btn">&#9654;</button>
        <div id="progress-wrap"><div id="progress-fill"></div></div>
        <span id="time-display">0:00 / 0:00</span>
    </div>

    <script>
// ═══════════════════════════════════════════════════════════════════════
// S³ BRAIN SIGNAL VIEWER — Animated 2D Canvas
// ═══════════════════════════════════════════════════════════════════════

const SIGNAL_COLORS = {
    // Shared
    arousal:              '#ef4444',
    prediction_error:     '#14b8a6',
    harmonic_context:     '#fbbf24',
    emotional_momentum:   '#c084fc',
    // Reward
    da_caudate:           '#f97316',
    da_nacc:              '#22c55e',
    opioid_proxy:         '#fbbf24',
    wanting:              '#ef4444',
    liking:               '#3b82f6',
    pleasure:             '#a855f7',
    tension:              '#f43f5e',
    prediction_match:     '#64748b',
    reward_forecast:      '#ef4444',
    // Affect
    f03_valence:          '#3b82f6',
    mode_signal:          '#f97316',
    consonance_valence:   '#22c55e',
    happy_pathway:        '#fbbf24',
    sad_pathway:          '#8b5cf6',
    emotion_certainty:    '#06b6d4',
    // Autonomic
    scr:                  '#22c55e',
    hr:                   '#ef4444',
    respr:                '#3b82f6',
    chills_intensity:     '#06b6d4',
    ans_composite:        '#a855f7',
    // Integration
    beauty:               '#fbbf24',
    emotional_arc:        '#6366f1',
};

const PATHWAY_LABELS = {
    shared:      'Shared',
    reward:      'Reward (SRP)',
    affect:      'Affect (VMM)',
    autonomic:   'Autonomic (AAC)',
    integration: 'Integration',
};

const PATHWAY_ORDER = ['shared', 'reward', 'affect', 'autonomic', 'integration'];
const PATHWAY_HEIGHTS = [1, 2.2, 1.5, 1.3, 0.8]; // relative height weights

// ─── State ──────────────────────────────────────────
let data = null;
let audioCtx = null;
let audioBuffer = null;
let audioSource = null;
let playing = false;
let startOffset = 0;
let startTime = 0;
let duration = 0;

function getCurrentTime() {
    if (!playing) return startOffset;
    return startOffset + (audioCtx.currentTime - startTime);
}

// ─── Load ───────────────────────────────────────────
async function init() {
    // Load data
    const res = await fetch('data/brain-signals.json');
    data = await res.json();
    duration = data.meta.duration_s;

    // Load audio
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const audioRes = await fetch('data/swan-lake.mp3');
    const audioRaw = await audioRes.arrayBuffer();
    audioBuffer = await audioCtx.decodeAudioData(audioRaw);

    // Show UI
    document.getElementById('loading').style.display = 'none';
    document.getElementById('header').style.display = 'flex';
    document.getElementById('canvas-container').style.display = 'block';
    document.getElementById('transport').style.display = 'flex';

    document.getElementById('header-meta').textContent =
        `${data.meta.title} — ${data.meta.composer} | ${data.meta.frames} frames @ ${data.meta.frame_rate}Hz | σ=${data.meta.smooth_sigma_s}s`;

    setupCanvas();
    setupTransport();
    requestAnimationFrame(loop);
}

// ─── Canvas ─────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function setupCanvas() {
    function resize() {
        const container = document.getElementById('canvas-container');
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = Math.floor(container.clientWidth * dpr);
        H = Math.floor(container.clientHeight * dpr);
        canvas.width = W;
        canvas.height = H;
        canvas.style.width = container.clientWidth + 'px';
        canvas.style.height = container.clientHeight + 'px';
    }
    resize();
    window.addEventListener('resize', resize);

    // Click to seek on canvas
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const plotLeft = 70;
        const plotRight = rect.width - 12;
        const pct = (x - plotLeft) / (plotRight - plotLeft);
        if (pct >= 0 && pct <= 1) {
            seek(pct * duration);
        }
    });
}

// ─── Transport ──────────────────────────────────────
function setupTransport() {
    document.getElementById('play-btn').addEventListener('click', togglePlay);
    document.getElementById('progress-wrap').addEventListener('click', (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        seek(pct * duration);
    });
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    });
}

function togglePlay() {
    if (playing) pause();
    else play();
}

function play(from) {
    if (!audioBuffer) return;
    stop();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioSource = audioCtx.createBufferSource();
    audioSource.buffer = audioBuffer;
    audioSource.connect(audioCtx.destination);
    audioSource.onended = () => { playing = false; };
    const offset = from != null ? from : startOffset;
    startOffset = offset;
    startTime = audioCtx.currentTime;
    audioSource.start(0, offset);
    playing = true;
}

function pause() {
    if (!playing) return;
    startOffset = getCurrentTime();
    stop();
}

function stop() {
    if (audioSource) {
        try { audioSource.stop(); } catch(e) {}
        audioSource.disconnect();
        audioSource = null;
    }
    playing = false;
}

function seek(t) {
    const wasPlaying = playing;
    stop();
    startOffset = Math.max(0, Math.min(t, duration));
    if (wasPlaying) play(startOffset);
}

// ─── Render ─────────────────────────────────────────
function loop() {
    requestAnimationFrame(loop);
    if (!data) return;
    draw();
    updateTransportUI();
}

function updateTransportUI() {
    const t = getCurrentTime();
    const pct = duration > 0 ? (t / duration * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('time-display').textContent =
        `${fmtTime(t)} / ${fmtTime(duration)}`;
    document.getElementById('play-btn').innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
}

function fmtTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function draw() {
    const dpr = W / (canvas.clientWidth || 1);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, W, H);

    const margin = { left: 70 * dpr, right: 12 * dpr, top: 8 * dpr, bottom: 8 * dpr, gap: 6 * dpr };
    const plotW = W - margin.left - margin.right;
    const totalWeight = PATHWAY_HEIGHTS.reduce((a, b) => a + b, 0);
    const totalH = H - margin.top - margin.bottom - margin.gap * (PATHWAY_ORDER.length - 1);

    const currentTime = getCurrentTime();
    const T = data.values.length;
    const times = data.times;

    let y = margin.top;

    for (let pi = 0; pi < PATHWAY_ORDER.length; pi++) {
        const pwKey = PATHWAY_ORDER[pi];
        const pw = data.pathways[pwKey];
        const panelH = (PATHWAY_HEIGHTS[pi] / totalWeight) * totalH;
        const dims = pw.dimensions;
        const dimStart = pw.range[0];

        // ─── Panel background ───────────────────
        ctx.fillStyle = '#0d0d14';
        ctx.fillRect(margin.left, y, plotW, panelH);

        // ─── Moment bands ───────────────────────
        for (const m of data.moments) {
            const x0 = margin.left + (m.start / duration) * plotW;
            const x1 = margin.left + (m.end / duration) * plotW;
            ctx.fillStyle = m.color + '40'; // 25% alpha
            ctx.fillRect(x0, y, x1 - x0, panelH);
        }

        // ─── Grid lines ────────────────────────
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 0.5 * dpr;
        // Horizontal: 0.25, 0.5, 0.75
        for (const frac of [0.25, 0.5, 0.75]) {
            const gy = y + panelH * (1 - frac);
            ctx.beginPath();
            ctx.moveTo(margin.left, gy);
            ctx.lineTo(margin.left + plotW, gy);
            ctx.stroke();
        }
        // Vertical: every 30s
        for (let ts = 30; ts < duration; ts += 30) {
            const gx = margin.left + (ts / duration) * plotW;
            ctx.beginPath();
            ctx.moveTo(gx, y);
            ctx.lineTo(gx, y + panelH);
            ctx.stroke();
        }

        // ─── Signal traces ──────────────────────
        // Compute min/max for this pathway to auto-scale
        let vMin = Infinity, vMax = -Infinity;
        for (let di = 0; di < dims.length; di++) {
            const col = dimStart + di;
            for (let fi = 0; fi < T; fi++) {
                const v = data.values[fi][col];
                if (v < vMin) vMin = v;
                if (v > vMax) vMax = v;
            }
        }
        const vRange = vMax - vMin || 1;
        const vPad = vRange * 0.05;

        for (let di = 0; di < dims.length; di++) {
            const dimName = dims[di];
            const col = dimStart + di;
            const color = SIGNAL_COLORS[dimName] || '#94a3b8';

            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5 * dpr;
            ctx.globalAlpha = 0.85;
            ctx.beginPath();

            for (let fi = 0; fi < T; fi++) {
                const x = margin.left + (times[fi] / duration) * plotW;
                const v = data.values[fi][col];
                const ny = 1 - (v - vMin + vPad) / (vRange + 2 * vPad);
                const sy = y + ny * panelH;
                if (fi === 0) ctx.moveTo(x, sy);
                else ctx.lineTo(x, sy);
            }
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        // ─── Glow trail near playhead ───────────
        const trailWidth = 3; // seconds
        for (let di = 0; di < dims.length; di++) {
            const dimName = dims[di];
            const col = dimStart + di;
            const color = SIGNAL_COLORS[dimName] || '#94a3b8';

            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5 * dpr;
            ctx.globalAlpha = 1;
            ctx.shadowColor = color;
            ctx.shadowBlur = 6 * dpr;
            ctx.beginPath();

            let started = false;
            for (let fi = 0; fi < T; fi++) {
                const t = times[fi];
                if (t < currentTime - trailWidth || t > currentTime) continue;
                const x = margin.left + (t / duration) * plotW;
                const v = data.values[fi][col];
                const ny = 1 - (v - vMin + vPad) / (vRange + 2 * vPad);
                const sy = y + ny * panelH;
                if (!started) { ctx.moveTo(x, sy); started = true; }
                else ctx.lineTo(x, sy);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // ─── Pathway label ──────────────────────
        ctx.fillStyle = '#94a3b8';
        ctx.font = `600 ${11 * dpr}px Inter, system-ui`;
        ctx.textBaseline = 'top';
        ctx.fillText(PATHWAY_LABELS[pwKey], margin.left + 6 * dpr, y + 4 * dpr);

        // ─── Legend (dimension names) ────────────
        ctx.font = `500 ${9.5 * dpr}px Inter, system-ui`;
        let lx = margin.left + 6 * dpr;
        let ly = y + 18 * dpr;
        for (let di = 0; di < dims.length; di++) {
            const dimName = dims[di];
            const color = SIGNAL_COLORS[dimName] || '#94a3b8';
            const label = dimName.replace(/_/g, ' ');
            const tw = ctx.measureText(label).width;

            // Legend dot
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(lx + 4 * dpr, ly + 5 * dpr, 3 * dpr, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#94a3b8';
            ctx.fillText(label, lx + 10 * dpr, ly);
            lx += tw + 18 * dpr;

            // Wrap if needed
            if (lx > margin.left + plotW * 0.8) {
                lx = margin.left + 6 * dpr;
                ly += 14 * dpr;
            }
        }

        // ─── Y-axis labels ─────────────────────
        ctx.fillStyle = '#64748b';
        ctx.font = `${9 * dpr}px Inter, system-ui`;
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        for (const frac of [0, 0.5, 1]) {
            const val = vMin + frac * vRange;
            const gy = y + panelH * (1 - frac);
            ctx.fillText(val.toFixed(2), margin.left - 4 * dpr, gy);
        }
        ctx.textAlign = 'left';

        // ─── Panel border ───────────────────────
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 1 * dpr;
        ctx.strokeRect(margin.left, y, plotW, panelH);

        y += panelH + margin.gap;
    }

    // ─── Moment labels (bottom) ─────────────────
    ctx.font = `500 ${10 * dpr}px Inter, system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    for (const m of data.moments) {
        const cx = margin.left + ((m.start + m.end) / 2 / duration) * plotW;
        ctx.fillStyle = '#64748b';
        ctx.fillText(m.label, cx, H - margin.bottom);
    }

    // ─── Playhead ───────────────────────────────
    const px = margin.left + (currentTime / duration) * plotW;
    ctx.strokeStyle = '#f9b73a';
    ctx.lineWidth = 2 * dpr;
    ctx.shadowColor = '#f9b73a';
    ctx.shadowBlur = 8 * dpr;
    ctx.beginPath();
    ctx.moveTo(px, margin.top);
    ctx.lineTo(px, H - margin.bottom);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Playhead time label
    ctx.fillStyle = '#f9b73a';
    ctx.font = `600 ${10 * dpr}px Inter, system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(fmtTime(currentTime), px, margin.top - 1 * dpr);

    // ─── Time axis labels ───────────────────────
    ctx.fillStyle = '#64748b';
    ctx.font = `${9.5 * dpr}px Inter, system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (let ts = 0; ts <= duration; ts += 30) {
        const gx = margin.left + (ts / duration) * plotW;
        ctx.fillText(fmtTime(ts), gx, H - margin.bottom + 2 * dpr);
    }

    // ─── Current values readout (right of playhead) ─
    const frameIdx = Math.min(T - 1, Math.max(0, Math.floor(currentTime * data.meta.frame_rate)));
    if (frameIdx >= 0 && frameIdx < T) {
        const vals = data.values[frameIdx];
        let ry = margin.top + 4 * dpr;
        ctx.textAlign = 'left';
        ctx.font = `600 ${9 * dpr}px Inter, system-ui`;
        const rx = Math.min(px + 8 * dpr, W - 120 * dpr);

        // Show top 5 most active signals
        const active = data.dimensions.map((name, i) => ({
            name, value: vals[i], absVal: Math.abs(vals[i])
        }));
        active.sort((a, b) => b.absVal - a.absVal);

        ctx.fillStyle = 'rgba(10, 10, 15, 0.85)';
        ctx.fillRect(rx, ry, 105 * dpr, 75 * dpr);

        for (let i = 0; i < 5 && i < active.length; i++) {
            const s = active[i];
            const color = SIGNAL_COLORS[s.name] || '#94a3b8';
            ctx.fillStyle = color;
            ctx.fillText(s.name.replace(/_/g, ' '), rx + 4 * dpr, ry + 4 * dpr + i * 14 * dpr);
            ctx.fillStyle = '#c8c8d4';
            ctx.fillText(s.value.toFixed(3), rx + 75 * dpr, ry + 4 * dpr + i * 14 * dpr);
        }
    }

    // ─── Event markers ──────────────────────────
    if (data.events) {
        ctx.font = `500 ${9 * dpr}px Inter, system-ui`;
        const markers = [
            { t: data.events.wanting_peak_s, label: 'W peak', color: '#ef4444' },
            { t: data.events.liking_peak_s, label: 'L peak', color: '#3b82f6' },
            { t: data.events.pleasure_peak_s, label: 'P peak', color: '#a855f7' },
            { t: data.events.chills_peak_s, label: 'Chills', color: '#06b6d4' },
        ];
        for (const mk of markers) {
            if (!mk.t) continue;
            const mx = margin.left + (mk.t / duration) * plotW;
            ctx.strokeStyle = mk.color;
            ctx.globalAlpha = 0.5;
            ctx.lineWidth = 1 * dpr;
            ctx.setLineDash([4 * dpr, 4 * dpr]);
            ctx.beginPath();
            ctx.moveTo(mx, margin.top);
            ctx.lineTo(mx, H - margin.bottom);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;

            ctx.fillStyle = mk.color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(mk.label, mx, margin.top + 2 * dpr);
        }
    }
}

// ─── Boot ──────────────────────────────────────────
init().catch(e => {
    document.getElementById('loading').textContent = 'Error: ' + e.message;
    console.error(e);
});
    </script>
</body>
</html>
