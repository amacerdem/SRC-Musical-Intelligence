[pytest]
testpaths = v1_pharmacology v2_idyom v3_krumhansl v4_deam v5_eeg_encoding v6_fmri_encoding v7_rsa
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short -x
markers =
    v1: Pharmacology validation
    v2: IDyOM benchmark
    v3: Krumhansl tonal profiles
    v4: DEAM continuous emotion
    v5: EEG encoding models
    v6: fMRI encoding models
    v7: RSA analysis
    slow: Tests > 60s
    requires_download: Needs external dataset
