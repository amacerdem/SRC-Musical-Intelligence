# MI-Core Training -- Root Configuration
#
# Composes all sub-configs via Hydra defaults.
# Override any value from CLI: python train.py model.d_model=1024
#
# Reference: MI-VISION Sections 12-13

defaults:
  - model: mi_core
  - training: default
  - data: default
  - evaluation: default

# Experiment metadata
experiment:
  name: mi-core-v1
  seed: 42
  output_dir: outputs/${experiment.name}
  checkpoint_dir: ${experiment.output_dir}/checkpoints
  log_dir: ${experiment.output_dir}/logs

# Hardware
hardware:
  device: cuda
  n_gpus: 1
  precision: bf16            # bf16 | fp32
  num_workers: 4
  pin_memory: true

# Logging
logging:
  use_wandb: false
  wandb_project: mi-core-training
  wandb_entity: null
  log_every: 50              # Log metrics every N steps
  save_every_epoch: 10       # Save checkpoint every N epochs
