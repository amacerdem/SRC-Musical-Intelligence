# Training Configuration
#
# Default hyperparameters for MI-Core bidirectional training.
# Reference: MI-VISION Section 12

# Optimizer
optimizer:
  name: adamw
  lr: 3.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8

# Learning rate schedule
lr_scheduler:
  name: cosine_warmup
  warmup_steps: 1000
  total_steps: 100000
  min_lr_ratio: 0.1

# Training loop
training:
  n_epochs: 600
  batch_size: 8
  grad_accum_steps: 4          # Effective batch size = 32
  max_grad_norm: 1.0
  use_amp: true

# Validation
validation:
  val_every_epoch: 5
  val_batch_size: 16
