# 5-Phase Curriculum Weight Schedule
#
# Mirrors MI Teacher pipeline: Mel → R3 → H3 → C3
# Reference: MI-VISION Section 12.4

interpolate: true              # Linear interpolation between phases

phases:
  # Phase 1 (ep 0-49): Learn spectral decomposition
  - epoch_start: 0
    weights:
      encode_mel: 1.0
      encode_r3: 0.5
      encode_h3: 0.1
      encode_c3: 0.0
      decode_h3: 0.0
      decode_r3: 0.0
      decode_mel: 0.0
      decode_wav: 0.0
      cycle_forward: 0.0
      cycle_inverse: 0.0
      fill_c3: 0.0
      fill_decode: 0.0
      temporal_smooth: 0.1
      expert_balance: 0.1

  # Phase 2 (ep 50-149): Learn psychoacoustic features
  - epoch_start: 50
    weights:
      encode_mel: 0.5
      encode_r3: 1.0
      encode_h3: 0.5
      encode_c3: 0.1
      decode_h3: 0.0
      decode_r3: 0.1
      decode_mel: 0.1
      decode_wav: 0.0
      cycle_forward: 0.0
      cycle_inverse: 0.0
      fill_c3: 0.0
      fill_decode: 0.0
      temporal_smooth: 0.1
      expert_balance: 0.1

  # Phase 3 (ep 150-299): Learn temporal context
  - epoch_start: 150
    weights:
      encode_mel: 0.2
      encode_r3: 0.5
      encode_h3: 1.0
      encode_c3: 0.5
      decode_h3: 0.5
      decode_r3: 0.3
      decode_mel: 0.2
      decode_wav: 0.0
      cycle_forward: 0.1
      cycle_inverse: 0.1
      fill_c3: 0.1
      fill_decode: 0.1
      temporal_smooth: 0.2
      expert_balance: 0.1

  # Phase 4 (ep 300-499): Learn cognitive outputs
  - epoch_start: 300
    weights:
      encode_mel: 0.1
      encode_r3: 0.2
      encode_h3: 0.5
      encode_c3: 1.0
      decode_h3: 0.5
      decode_r3: 0.5
      decode_mel: 0.5
      decode_wav: 0.3
      cycle_forward: 0.5
      cycle_inverse: 0.5
      fill_c3: 0.5
      fill_decode: 0.5
      temporal_smooth: 0.2
      expert_balance: 0.1

  # Phase 5 (ep 500+): Full balance
  - epoch_start: 500
    weights:
      encode_mel: 0.2
      encode_r3: 0.3
      encode_h3: 0.3
      encode_c3: 1.0
      decode_h3: 0.5
      decode_r3: 0.5
      decode_mel: 0.5
      decode_wav: 0.5
      cycle_forward: 0.5
      cycle_inverse: 0.5
      fill_c3: 1.0
      fill_decode: 0.5
      temporal_smooth: 0.2
      expert_balance: 0.1
